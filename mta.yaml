_schema-version: 3.3.0
ID: incident-management
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: incident-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: incident-management-destination
      - name: incident-management-db
      - name: incident-management-auth

  - name: incident-management-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: incident-management-db

  - name: incident-management
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: incident-management-auth
      - name: incident-management-destination
      - name: incident-management-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: incident-management-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: incident-management-workzone-cdm
          artifacts:
            - cdm.json
          target-path: app/
        - name: incidentmanagementincidentoverview
          artifacts:
            - incident-overview.zip
          target-path: app/
        - name: incidentmanagementincidents
          artifacts:
            - incidents.zip
          target-path: app/
    requires:
      - name: incident-management-auth
      - name: srv-api
      - name: incident-management-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: incident-management-destination-content
    type: com.sap.application.content
    requires:
      - name: incident-management-destination
        parameters:
          content-target: true
      - name: incident-management-html5-repo-host
        parameters:
          service-key:
            name: incident-management-html5-repo-host-key
      - name: incident-management-auth
        parameters:
          service-key:
            name: incident-management-auth-key
    parameters:
      content:
        instance:
          destinations:
            - Name: incident-management-html5-repo-host
              ServiceInstanceName: incident-management-html5-repo-host
              ServiceKeyName: incident-management-html5-repo-host-key
              sap.cloud.service: incident-management
            - Authentication: OAuth2UserTokenExchange
              Name: incident-management-auth
              ServiceInstanceName: incident-management-auth
              ServiceKeyName: incident-management-auth-key
              sap.cloud.service: incident-management
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true

  - name: incidentmanagementincidentoverview
    type: html5
    path: app/incident-overview
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: incidentmanagementincidents
    type: html5
    path: app/incidents
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: incident-management-workzone-cdm
    type: html5
    path: workzone
    build-parameters:
      build-result: .
      supported-platforms: []

resources:
  - name: incident-management-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
  - name: incident-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: incident-management-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: incident-management-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'support (incident-management ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.support'
          - name: 'admin (incident-management ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.admin'
    requires:
      - name: app-api

  - name: incident-management-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
      config:
        sizeLimit: 2

  - name: incident-management-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
